<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>JumpLogs · Updated logos</title>
<link rel="stylesheet" href="lib/tokens.css">
<style>
  body { margin: 0; background: var(--bg); color: var(--fg); font-family: var(--font-ui); padding: 48px; }
  h1 { font-size: 28px; letter-spacing: -0.02em; margin: 0 0 6px; }
  .sub { font-family: var(--font-mono); font-size: 12px; color: var(--fg-3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 36px; }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; max-width: 1100px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px; }
  .card.light { background: #F4F1EB; }
  .card.sky   { background: var(--sky); }
  .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-3); }
  .label.dark { color: #0A1220; opacity: 0.6; }
  .stage { min-height: 110px; display: flex; align-items: center; justify-content: center; }
  .scale { display: flex; align-items: center; gap: 24px; margin-top: 8px; }
  .scale img, .stage img { display: block; }
  .og { grid-column: 1 / -1; }
  .og .stage { padding: 12px; background: #060B14; border-radius: 10px; }
  .og img { width: 100%; max-width: 900px; height: auto; }
</style>
</head>
<body>
  <h1>JumpLogs — updated logo pack</h1>
  <div class="sub">Rebrand · canopy mark unchanged · wordmark + social retypeset</div>

  <div class="grid">
    <div class="card">
      <div class="row"><span class="label">Wordmark · on dark</span><span class="label">260×64</span></div>
      <div class="stage"><img src="brand/svg/wordmark-on-dark.svg" alt="" height="64"></div>
    </div>
    <div class="card light">
      <div class="row"><span class="label dark">Wordmark · on light</span><span class="label dark">260×64</span></div>
      <div class="stage"><img src="brand/svg/wordmark-on-light.svg" alt="" height="64"></div>
    </div>

    <div class="card">
      <div class="row"><span class="label">Mark · on dark</span><span class="label">scale set</span></div>
      <div class="scale">
        <img src="brand/svg/mark-on-dark.svg" alt="" height="96">
        <img src="brand/svg/mark-on-dark.svg" alt="" height="56">
        <img src="brand/svg/mark-simple-on-dark.svg" alt="" height="32">
        <img src="brand/svg/mark-simple-on-dark.svg" alt="" height="20">
      </div>
    </div>
    <div class="card light">
      <div class="row"><span class="label dark">Mark · on light</span><span class="label dark">scale set</span></div>
      <div class="scale">
        <img src="brand/svg/mark-on-light.svg" alt="" height="96">
        <img src="brand/svg/mark-on-light.svg" alt="" height="56">
        <img src="brand/svg/mark-simple-on-light.svg" alt="" height="32">
        <img src="brand/svg/mark-simple-on-light.svg" alt="" height="20">
      </div>
    </div>

    <div class="card">
      <div class="row"><span class="label">App icon</span><span class="label">1024×1024</span></div>
      <div class="stage"><img src="brand/svg/app-icon-1024.svg" alt="" width="160" height="160" style="border-radius:32px"></div>
    </div>
    <div class="card sky">
      <div class="row"><span class="label dark">Mark · on sky</span><span class="label dark">use inside CTA</span></div>
      <div class="stage"><img src="brand/svg/mark-on-sky.svg" alt="" height="80"></div>
    </div>

    <div class="card og">
      <div class="row"><span class="label">Social · Open Graph</span><span class="label">1200×630</span></div>
      <div class="stage"><img src="brand/svg/social-og.svg" alt=""></div>
    </div>
  </div>
</body>
</html>
